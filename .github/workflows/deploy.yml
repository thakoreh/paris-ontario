name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx next build --no-turbopack 2>&1 || npx next build 2>&1
      - name: Add .nojekyll
        run: touch out/.nojekyll
      # Next.js static export creates:
      #   /blog.html          -> needs /blog/index.html
      #   /blog/slug.html     -> needs /blog/slug/index.html
      #   /photo-challenge.html -> needs /photo-challenge/index.html
      # GitHub Pages needs index.html inside directories for trailing-slash URLs
      - name: Fix trailing slash routes for GitHub Pages
        run: |
          # Top-level routes: blog.html -> blog/index.html
          for file in out/*.html; do
            name=$(basename "$file" .html)
            if [ "$name" != "index" ] && [ "$name" != "404" ]; then
              mkdir -p "out/$name"
              cp "$file" "out/$name/index.html"
            fi
          done
          # Blog subdirectory pages: blog/slug.html -> blog/slug/index.html
          if [ -d "out/blog" ]; then
            for file in out/blog/*.html; do
              slug=$(basename "$file" .html)
              mkdir -p "out/blog/$slug"
              cp "$file" "out/blog/$slug/index.html"
            done
          fi
          echo "=== Directory structure ==="
          find out -type d | head -30
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
