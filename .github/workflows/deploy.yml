name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx next build --no-turbopack 2>&1 || npx next build 2>&1
      - name: Add .nojekyll
        run: touch out/.nojekyll
      # Next.js static export creates /blog.html but GitHub Pages needs /blog/index.html
      # for trailing-slash routes. Fix: copy .html files to directory/index.html
      - name: Fix trailing slash routes for GitHub Pages
        run: |
          # For each route that has a .html but no directory/index.html, create the directory structure
          for file in out/*.html; do
            name=$(basename "$file" .html)
            if [ "$name" != "index" ] && [ "$name" != "404" ]; then
              mkdir -p "out/$name"
              cp "$file" "out/$name/index.html"
              echo "Created out/$name/index.html from $file"
            fi
          done
          echo "=== Final out/ directory structure ==="
          find out -type d | head -30
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
